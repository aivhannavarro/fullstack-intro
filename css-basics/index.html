<!DOCTYPE html>
<html>
<head>
    <title>CSS Basics</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- HEADER -->
    <header>
        <h1>My CSS Basics Page</h1>
    </header>

    <!-- MAIN -->
    <main>

        <!-- BOX MODEL -->
        <section class="box">
            <h2>Box Model Example</h2>
            <p>This box shows margin, padding, and border.</p>
        </section>

        <!-- FLEXBOX -->
        <section class="flex-container">
            <div class="item">1</div>
            <div class="item">2</div>
            <div class="item">3</div>
        </section>

        <!-- FORM -->
        <section>
            <h2>Styled Form</h2>
            <form>
                <label>Name:</label>
                <input type="text">

                <label>Email:</label>
                <input type="email">

                <button type="submit">Submit</button>
            </form>
        </section>

    </main>

    <!-- FOOTER -->
    <footer>
        <p>© 2026 CSS Basics</p>
    </footer>

</body>
</html>
